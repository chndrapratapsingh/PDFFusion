<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="pdfViewer_style.css">
    <script src="https://acrobatservices.adobe.com/view-sdk/viewer.js"></script>


</head>
<body>
    <header>
        <h2>Online PDFFusion</h2>
        <ul>
            <li><a href="./index.html">Home</a></li>
            <li><a href="./pdfEditor.html">PDF Editor</a></li>
            <li><a href="./pdfViewer.html">PDF Viewer</a></li>
            <li><a href="./pdfReducer.html">PDF Reducer</a></li>
        </ul>
    </header>
    <div id="main">
        <h1>Welcome to Pdf Editor</h1>
        <p>Edit your PDF files with our easy-to-use editor. No need for additional software!</p>

        <div id="pdfViewer" style="height: 52vh;">
            <p style="font-size: 7vh; font-family: 'Courier New', Courier, monospace; text-decoration: underline;">Pdf Editor Is Currently Under Development</p>
            <!-- <input type="file" name="pdf" id="pdf"> -->
            <!-- <button id="PdfButton">Upload PDF</button> -->
        </div>
        <!-- <div id="adobe-dc-view" style="height: 600px;"></div> -->

    </div>
    <footer>
        <p>Copyright &copy; PDFFusion. All rights reserved.</p>
    </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        document.addEventListener("adobe_dc_view_sdk.ready", function () {
        var adobeDCView = new AdobeDC.View({
            clientId: "YOUR_API_KEY",
            divId: "adobe-dc-view"
        });

        adobeDCView.previewFile({
            content: { location: { url: "sample.pdf" } },
            metaData: { fileName: "sample.pdf" }
        }, {
            embedMode: "FULL_WINDOW",
            showAnnotationTools: true
        });
        });
    </script>
</body>
</html>
